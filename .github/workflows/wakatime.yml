name: Update WakaTime

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download WakaTime SVG
        run: |
          mkdir -p assets
          curl -o assets/wakatime.svg \
            "https://wakatime.com/share/@forbxpg/dbeee904-a3cb-4135-8cb2-d10b4f2bf0b9.svg"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/wakatime.svg
          git diff --staged --quiet || git commit -m "Update WakaTime stats"
          git push
